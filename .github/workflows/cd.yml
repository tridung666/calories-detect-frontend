name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Docker Metadata
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    outputs:
      deploy_sha: ${{ steps.vars.outputs.deploy_sha }}
      deploy_branch: ${{ steps.vars.outputs.deploy_branch }}
      is_default_branch: ${{ steps.vars.outputs.is_default_branch }}

    steps:
      - name: Resolve commit to build
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
            DEPLOY_BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            DEPLOY_SHA="${{ github.sha }}"
            DEPLOY_BRANCH="${{ github.ref_name }}"
          fi

          IS_DEFAULT_BRANCH="false"

          if [ "$DEPLOY_BRANCH" = "${{ github.event.repository.default_branch }}" ]; then
            IS_DEFAULT_BRANCH="true"
          fi

          echo "deploy_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
          echo "is_default_branch=$IS_DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"


  docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - prepare

    outputs:
      deploy_tag: ${{ steps.image.outputs.deploy_tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_sha }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: image
        run: |
          DEPLOY_TAG="sha-${{ needs.prepare.outputs.deploy_sha }}"

          echo "deploy_tag=$DEPLOY_TAG" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$DEPLOY_TAG"

            if [ "${{ needs.prepare.outputs.is_default_branch }}" = "true" ]; then
              echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs:
      - prepare
      - docker

    if: needs.prepare.outputs.is_default_branch == 'true'

    steps:
      - name: Deploy frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_SSH_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            set -e

            cd /opt/calories-detect

            DEPLOY_TAG="${{ needs.docker.outputs.deploy_tag }}"

            echo "Deploy tag: $DEPLOY_TAG"
            echo "Current directory:"
            pwd

            if grep -q '^FRONTEND_TAG=' .env; then
              echo "FRONTEND_TAG exists. Updating..."
              sed -i "s|^FRONTEND_TAG=.*|FRONTEND_TAG=$DEPLOY_TAG|" .env
            else
              echo "FRONTEND_TAG does not exist. Creating..."
              echo "FRONTEND_TAG=$DEPLOY_TAG" >> .env
            fi

            echo "Current FRONTEND_TAG:"
            grep '^FRONTEND_TAG=' .env

            echo "Compose services:"
            docker compose config --services

            echo "Pulling frontend image..."
            docker compose pull frontend

            echo "Starting frontend container..."
            docker compose up -d frontend

            echo "Frontend container status:"
            docker compose ps frontend

            docker image prune -f